<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b81;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGrad)" />

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#ffffff">
    <circle cx="30" cy="30" r="1.5" /><circle cx="60" cy="30" r="1.5" /><circle cx="90" cy="30" r="1.5" /><circle cx="120" cy="30" r="1.5" />
    <circle cx="30" cy="60" r="1.5" /><circle cx="60" cy="60" r="1.5" /><circle cx="90" cy="60" r="1.5" /><circle cx="120" cy="60" r="1.5" />
    <circle cx="30" cy="90" r="1.5" /><circle cx="60" cy="90" r="1.5" /><circle cx="90" cy="90" r="1.5" /><circle cx="120" cy="90" r="1.5" />
    <circle cx="30" cy="120" r="1.5" /><circle cx="60" cy="120" r="1.5" /><circle cx="90" cy="120" r="1.5" /><circle cx="120" cy="120" r="1.5" />
    <circle cx="680" cy="80" r="1.5" /><circle cx="710" cy="80" r="1.5" /><circle cx="740" cy="80" r="1.5" /><circle cx="770" cy="80" r="1.5" />
    <circle cx="680" cy="110" r="1.5" /><circle cx="710" cy="110" r="1.5" /><circle cx="740" cy="110" r="1.5" /><circle cx="770" cy="110" r="1.5" />
    <circle cx="680" cy="140" r="1.5" /><circle cx="710" cy="140" r="1.5" /><circle cx="740" cy="140" r="1.5" /><circle cx="770" cy="140" r="1.5" />
    <circle cx="680" cy="170" r="1.5" /><circle cx="710" cy="170" r="1.5" /><circle cx="740" cy="170" r="1.5" /><circle cx="770" cy="170" r="1.5" />
  </g>

  <!-- Decorative chart icon (left side) -->
  <g transform="translate(160, 55)" opacity="0.25">
    <!-- Bar chart bars -->
    <rect x="0" y="50" width="12" height="30" rx="2" fill="#e94560" />
    <rect x="18" y="35" width="12" height="45" rx="2" fill="#e94560" />
    <rect x="36" y="20" width="12" height="60" rx="2" fill="#e94560" />
    <rect x="54" y="40" width="12" height="40" rx="2" fill="#e94560" />
    <rect x="72" y="10" width="12" height="70" rx="2" fill="#e94560" />
    <!-- Axis -->
    <line x1="0" y1="82" x2="84" y2="82" stroke="#e94560" stroke-width="1.5" opacity="0.5" />
  </g>

  <!-- Decorative scatter plot icon (right side) -->
  <g transform="translate(620, 50)" opacity="0.2">
    <circle cx="10" cy="60" r="4" fill="#e94560" />
    <circle cx="25" cy="45" r="4" fill="#e94560" />
    <circle cx="42" cy="50" r="4" fill="#e94560" />
    <circle cx="55" cy="30" r="4" fill="#e94560" />
    <circle cx="70" cy="35" r="4" fill="#e94560" />
    <circle cx="85" cy="15" r="4" fill="#e94560" />
    <circle cx="100" cy="20" r="4" fill="#e94560" />
    <!-- Trend line -->
    <line x1="5" y1="65" x2="105" y2="12" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" />
  </g>

  <!-- CSV icon (far left) -->
  <g transform="translate(50, 65)">
    <rect x="0" y="0" width="50" height="65" rx="6" fill="none" stroke="#e94560" stroke-width="2" opacity="0.4" />
    <line x1="0" y1="18" x2="50" y2="18" stroke="#e94560" stroke-width="1" opacity="0.3" />
    <line x1="0" y1="34" x2="50" y2="34" stroke="#e94560" stroke-width="1" opacity="0.3" />
    <line x1="0" y1="50" x2="50" y2="50" stroke="#e94560" stroke-width="1" opacity="0.3" />
    <line x1="18" y1="0" x2="18" y2="65" stroke="#e94560" stroke-width="1" opacity="0.3" />
    <line x1="35" y1="0" x2="35" y2="65" stroke="#e94560" stroke-width="1" opacity="0.3" />
  </g>

  <!-- Accent bar -->
  <rect x="280" y="155" width="240" height="3" rx="1.5" fill="url(#accentGrad)" filter="url(#glow)" />

  <!-- Main Title -->
  <text x="400" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    CSV Data Analyzer
  </text>

  <!-- Tagline -->
  <text x="400" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="2">
    AI-Powered Data Analysis &amp; Insights
  </text>

  <!-- Bottom accent dots -->
  <g transform="translate(340, 175)" opacity="0.5">
    <circle cx="0" cy="0" r="3" fill="#e94560" />
    <circle cx="30" cy="0" r="3" fill="#e94560" opacity="0.7" />
    <circle cx="60" cy="0" r="3" fill="#e94560" opacity="0.5" />
    <circle cx="90" cy="0" r="3" fill="#e94560" opacity="0.7" />
    <circle cx="120" cy="0" r="3" fill="#e94560" />
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="798" height="198" rx="12" fill="none" stroke="#e94560" stroke-width="1" opacity="0.15" />
</svg>
