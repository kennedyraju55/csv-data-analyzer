<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" rx="12" fill="url(#bgGrad)" />
  <rect x="1" y="1" width="798" height="348" rx="12" fill="none" stroke="#e94560" stroke-width="1" opacity="0.15" />

  <!-- Card 1: Smart Column Detection -->
  <g filter="url(#cardShadow)">
    <rect x="25" y="20" width="240" height="145" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
    <rect x="25" y="20" width="240" height="4" rx="2" fill="#e94560" opacity="0.8" />
    <!-- Icon: columns/table -->
    <g transform="translate(45, 42)">
      <rect x="0" y="0" width="28" height="28" rx="6" fill="#e94560" opacity="0.15" />
      <rect x="6" y="7" width="5" height="14" rx="1" fill="#e94560" />
      <rect x="13" y="10" width="5" height="11" rx="1" fill="#e94560" opacity="0.7" />
      <rect x="20" y="5" width="5" height="16" rx="1" fill="#e94560" opacity="0.5" />
    </g>
    <text x="85" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e0e0e0" font-weight="bold">Smart Column Detection</text>
    <text x="40" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e">
      <tspan x="40" dy="0">Auto-detect numeric, categorical,</tspan>
      <tspan x="40" dy="16">datetime, text, and boolean</tspan>
      <tspan x="40" dy="16">column types with heuristics</tspan>
    </text>
  </g>

  <!-- Card 2: Statistical Analysis -->
  <g filter="url(#cardShadow)">
    <rect x="280" y="20" width="240" height="145" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
    <rect x="280" y="20" width="240" height="4" rx="2" fill="#e94560" opacity="0.8" />
    <!-- Icon: chart/stats -->
    <g transform="translate(300, 42)">
      <rect x="0" y="0" width="28" height="28" rx="6" fill="#e94560" opacity="0.15" />
      <polyline points="5,22 10,14 16,18 22,8" fill="none" stroke="#e94560" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    <text x="340" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e0e0e0" font-weight="bold">Statistical Analysis</text>
    <text x="295" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e">
      <tspan x="295" dy="0">Skewness, kurtosis, null handling,</tspan>
      <tspan x="295" dy="16">distributions, descriptive stats</tspan>
      <tspan x="295" dy="16">for numeric &amp; categorical data</tspan>
    </text>
  </g>

  <!-- Card 3: Correlation Engine -->
  <g filter="url(#cardShadow)">
    <rect x="535" y="20" width="240" height="145" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
    <rect x="535" y="20" width="240" height="4" rx="2" fill="#e94560" opacity="0.8" />
    <!-- Icon: connected nodes -->
    <g transform="translate(555, 42)">
      <rect x="0" y="0" width="28" height="28" rx="6" fill="#e94560" opacity="0.15" />
      <circle cx="8" cy="10" r="3" fill="#e94560" />
      <circle cx="20" cy="10" r="3" fill="#e94560" opacity="0.7" />
      <circle cx="14" cy="22" r="3" fill="#e94560" opacity="0.5" />
      <line x1="8" y1="10" x2="20" y2="10" stroke="#e94560" stroke-width="1" opacity="0.5" />
      <line x1="8" y1="10" x2="14" y2="22" stroke="#e94560" stroke-width="1" opacity="0.5" />
      <line x1="20" y1="10" x2="14" y2="22" stroke="#e94560" stroke-width="1" opacity="0.5" />
    </g>
    <text x="595" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e0e0e0" font-weight="bold">Correlation Engine</text>
    <text x="550" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e">
      <tspan x="550" dy="0">Pearson correlation matrix with</tspan>
      <tspan x="550" dy="16">strong correlation flagging</tspan>
      <tspan x="550" dy="16">(threshold &gt; 0.5 configurable)</tspan>
    </text>
  </g>

  <!-- Card 4: Chart Suggestions -->
  <g filter="url(#cardShadow)">
    <rect x="25" y="185" width="240" height="145" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
    <rect x="25" y="185" width="240" height="4" rx="2" fill="#e94560" opacity="0.8" />
    <!-- Icon: pie chart -->
    <g transform="translate(45, 207)">
      <rect x="0" y="0" width="28" height="28" rx="6" fill="#e94560" opacity="0.15" />
      <circle cx="14" cy="14" r="8" fill="none" stroke="#e94560" stroke-width="2" />
      <path d="M14,14 L14,6 A8,8 0 0,1 21,11 Z" fill="#e94560" opacity="0.6" />
    </g>
    <text x="85" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e0e0e0" font-weight="bold">Chart Suggestions</text>
    <text x="40" y="255" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e">
      <tspan x="40" dy="0">Scatter, histogram, bar, line,</tspan>
      <tspan x="40" dy="16">and pie chart recommendations</tspan>
      <tspan x="40" dy="16">based on data characteristics</tspan>
    </text>
  </g>

  <!-- Card 5: Natural Language Queries -->
  <g filter="url(#cardShadow)">
    <rect x="280" y="185" width="240" height="145" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
    <rect x="280" y="185" width="240" height="4" rx="2" fill="#e94560" opacity="0.8" />
    <!-- Icon: chat bubble -->
    <g transform="translate(300, 207)">
      <rect x="0" y="0" width="28" height="28" rx="6" fill="#e94560" opacity="0.15" />
      <rect x="4" y="5" width="20" height="14" rx="4" fill="none" stroke="#e94560" stroke-width="1.5" />
      <polygon points="10,19 8,25 15,19" fill="#e94560" opacity="0.7" />
      <circle cx="10" cy="12" r="1.5" fill="#e94560" opacity="0.6" />
      <circle cx="14" cy="12" r="1.5" fill="#e94560" opacity="0.6" />
      <circle cx="18" cy="12" r="1.5" fill="#e94560" opacity="0.6" />
    </g>
    <text x="340" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e0e0e0" font-weight="bold">Natural Language Queries</text>
    <text x="295" y="255" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e">
      <tspan x="295" dy="0">Ask questions about your data</tspan>
      <tspan x="295" dy="16">in plain English, powered by</tspan>
      <tspan x="295" dy="16">local LLM (Ollama / Gemma)</tspan>
    </text>
  </g>

  <!-- Card 6: JSON Export -->
  <g filter="url(#cardShadow)">
    <rect x="535" y="185" width="240" height="145" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1" />
    <rect x="535" y="185" width="240" height="4" rx="2" fill="#e94560" opacity="0.8" />
    <!-- Icon: download/export -->
    <g transform="translate(555, 207)">
      <rect x="0" y="0" width="28" height="28" rx="6" fill="#e94560" opacity="0.15" />
      <rect x="6" y="4" width="16" height="12" rx="2" fill="none" stroke="#e94560" stroke-width="1.5" />
      <text x="14" y="14" font-family="monospace" font-size="8" fill="#e94560" text-anchor="middle" font-weight="bold">{}</text>
      <line x1="14" y1="18" x2="14" y2="24" stroke="#e94560" stroke-width="1.5" />
      <polyline points="10,22 14,26 18,22" fill="none" stroke="#e94560" stroke-width="1.5" />
    </g>
    <text x="595" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e0e0e0" font-weight="bold">JSON Export</text>
    <text x="550" y="255" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e">
      <tspan x="550" dy="0">Export all insights — column types,</tspan>
      <tspan x="550" dy="16">stats, correlations, charts — to</tspan>
      <tspan x="550" dy="16">structured JSON for pipelines</tspan>
    </text>
  </g>
</svg>
